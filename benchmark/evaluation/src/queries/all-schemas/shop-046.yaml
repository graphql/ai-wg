id: shop-046
schemaId: shopify
query: List the most recent abandoned checkouts that include high-value items.
operation: |
  query {
    abandonedCheckouts(first: 10, sortKey: CREATED_AT, reverse: true) {
      nodes {
        createdAt
        totalPriceSet {
          presentmentMoney {
            amount
            currencyCode
          }
        }
        lineItems(first: 5) {
          nodes {
            title
            quantity
            originalTotalPriceSet {
              presentmentMoney {
                amount
                currencyCode
              }
            }
          }
        }
      }
    }
  }
targetFields: []
targetTypes: []
mustInclude:
  - QueryRoot.abandonedCheckouts
  - QueryRoot.abandonedCheckouts(first:)
  - QueryRoot.abandonedCheckouts(sortKey:)
  - QueryRoot.abandonedCheckouts(reverse:)
  - AbandonedCheckout.createdAt
  - AbandonedCheckout.totalPriceSet
  - AbandonedCheckout.lineItems
  - AbandonedCheckout.lineItems(first:)
  - AbandonedCheckoutLineItem.title
  - AbandonedCheckoutLineItem.quantity
  - AbandonedCheckoutLineItem.originalTotalPriceSet
mustExclude:
  - Mutation
notes: Recent abandoned checkouts that include high-value items.
answerSchema:
  type: object
  properties:
    abandonedCheckouts:
      type: array
      items:
        type: object
        properties:
          createdAt:
            type: string
          totalPrice:
            type: string
          currencyCode:
            type: string
          lineItems:
            type: array
            items:
              type: object
              properties:
                title:
                  type: string
                quantity:
                  type: integer
                totalPrice:
                  type: string
                currencyCode:
                  type: string
              required:
                - title
                - quantity
                - totalPrice
                - currencyCode
              additionalProperties: false
        required:
          - createdAt
          - totalPrice
          - currencyCode
          - lineItems
        additionalProperties: false
  required:
    - abandonedCheckouts
  additionalProperties: false
