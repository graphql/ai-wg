id: glab-029
schemaId: gitlab
query: In project group/project, list merge requests with their head pipeline
  status and discussion resolved/resolvable state.
operation: |
  query {
    project(fullPath: "group/project") {
      mergeRequests(first: 10) {
        nodes {
          iid
          title
          headPipeline {
            status
          }
          discussions(first: 10) {
            nodes {
              resolved
              resolvable
            }
          }
        }
      }
    }
  }
targetFields:
  - MergeRequest.iid
  - MergeRequest.title
  - Pipeline.status
  - Discussion.resolved
  - Discussion.resolvable
targetTypes:
  - Discussion
  - Pipeline
mustInclude:
  - Query.project
  - Project.mergeRequests
  - MergeRequest.headPipeline
  - MergeRequest.discussions
  - MergeRequest.discussions(first:)
  - Project.mergeRequests(first:)
  - Query.project(fullPath:)
  - MergeRequest.iid
  - MergeRequest.title
  - Pipeline.status
  - Discussion.resolved
  - Discussion.resolvable
mustExclude:
  - Mutation
notes: "Maintainer: MRs with passing pipeline + unresolved discussions."
answerSchema:
  type: object
  properties:
    mergeRequests:
      type: array
      items:
        type: object
        properties:
          iid:
            type: string
          title:
            type: string
          headPipelineStatus:
            type: string
          discussions:
            type: array
            items:
              type: object
              properties:
                resolved:
                  type: boolean
                resolvable:
                  type: boolean
              required:
                - resolved
                - resolvable
              additionalProperties: false
        required:
          - iid
          - title
          - headPipelineStatus
          - discussions
        additionalProperties: false
  required:
    - mergeRequests
  additionalProperties: false
answer:
