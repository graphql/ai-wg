id: gh-ext-094
schemaId: github
query: What is the bandwidth and storage usage for the example enterprise?
operation: |
  query {
    enterprise(slug: "example") {
      billingInfo {
        bandwidthUsage
        storageUsage
      }
    }
  }
targetFields:
  - EnterpriseBillingInfo.bandwidthUsage
  - EnterpriseBillingInfo.storageUsage
targetTypes:
  - EnterpriseBillingInfo
  - Package
  - Organization
mustInclude:
  - Query.enterprise
  - Enterprise.billingInfo
  - EnterpriseBillingInfo.bandwidthUsage
  - EnterpriseBillingInfo.storageUsage
  - Query.enterprise(slug:)
mustExclude:
  - Mutation
notes: Enterprise billing info for Packages storage and bandwidth usage.
answerSchema:
  type: object
  properties:
    bandwidthUsage:
      type: number
    storageUsage:
      type: number
  required:
    - bandwidthUsage
    - storageUsage
  additionalProperties: false
answer:
  bandwidthUsage: 26
  storageUsage: 46.8