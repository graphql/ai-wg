id: gh-ext-015
schemaId: github
query: List pull requests in the octocat/example repository with their
  outstanding review requests.
operation: |
  query {
    repository(name: "example", owner: "octocat") {
      pullRequests(first: 10) {
        nodes {
          number
          title
          reviewRequests(first: 10) {
            nodes {
              requestedReviewer {
                ... on User {
                  login
                }
              }
            }
          }
        }
      }
    }
  }
targetFields:
  - PullRequest.number
  - PullRequest.title
  - User.login
targetTypes: []
mustInclude:
  - Query.repository
  - Repository.pullRequests
  - PullRequest.number
  - PullRequest.title
  - PullRequest.reviewRequests
  - ReviewRequest.requestedReviewer
  - PullRequest.reviewRequests(first:)
  - Query.repository(name:)
  - Query.repository(owner:)
  - Repository.pullRequests(first:)
mustExclude:
  - Mutation
notes: Walk PRs whose review-request list contains a particular reviewer.
answerSchema:
  type: object
  properties:
    pullRequests:
      type: array
      items:
        type: object
        properties:
          number:
            type: integer
          title:
            type: string
          requestedReviewers:
            type: array
            items:
              type: string
        required:
          - number
          - title
          - requestedReviewers
        additionalProperties: false
  required:
    - pullRequests
  additionalProperties: false
answer:
