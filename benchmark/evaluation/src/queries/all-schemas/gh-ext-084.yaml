id: gh-ext-084
schemaId: github
query: What views are configured on project Nr. 1 in the octocat organization
  and what are their filter strings?
operation: |
  query {
    organization(login: "octocat") {
      projectV2(number: 1) {
        views(first: 10) {
          nodes {
            filter
            name
          }
        }
      }
    }
  }
targetFields:
  - ProjectV2View.filter
  - ProjectV2View.name
targetTypes:
  - ProjectV2View
  - Project
mustInclude:
  - Query.organization
  - Organization.projectV2
  - ProjectV2.views
  - ProjectV2View.filter
  - ProjectV2View.name
  - Organization.projectV2(number:)
  - ProjectV2.views(first:)
  - Query.organization(login:)
mustExclude:
  - Mutation
notes: Project views with their filter string.
answerSchema:
  type: object
  properties:
    views:
      type: array
      items:
        type: object
        properties:
          name:
            type: string
          filter:
            type: string
        required:
          - name
          - filter
        additionalProperties: false
  required:
    - views
  additionalProperties: false
answer:
  views:
    - name: Board
      filter: no:assignee
    - name: Table
      filter: null