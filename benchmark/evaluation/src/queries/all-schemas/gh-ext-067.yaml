id: gh-ext-067
schemaId: github
query: What are the commit authors for pull request Nr. 1 in the octocat/example
  repository?
operation: |
  query {
    repository(name: "example", owner: "octocat") {
      pullRequest(number: 1) {
        commits(first: 10) {
          nodes {
            commit {
              authors(first: 10) {
                nodes {
                  name
                  email
                }
              }
            }
          }
        }
      }
    }
  }
targetFields:
  - GitActor.name
  - GitActor.email
targetTypes:
  - Commit
mustInclude:
  - Query.repository
  - Repository.pullRequest
  - PullRequest.commits
  - PullRequestCommit.commit
  - Commit.authors
  - Commit.authors(first:)
  - GitActorConnection.nodes
  - GitActor.name
  - GitActor.email
  - PullRequest.commits(first:)
  - Query.repository(name:)
  - Query.repository(owner:)
  - Repository.pullRequest(number:)
mustExclude:
  - Mutation
notes: PR commits whose authors connection has more than one entry implies
  co-authoring.
answerSchema:
  type: object
  properties:
    commitAuthors:
      type: array
      items:
        type: object
        properties:
          name:
            type: string
          email:
            type: string
        required:
          - name
          - email
        additionalProperties: false
  required:
    - commitAuthors
  additionalProperties: false
answer:
  commitAuthors:
    - name: Dave Dev
      email: dave@example.com
    - name: Eve Hacker
      email: eve@example.com
    - name: Eve Hacker
      email: eve@example.com
    - name: Dave Dev
      email: dave@example.com
