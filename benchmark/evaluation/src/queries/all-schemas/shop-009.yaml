id: shop-009
schemaId: shopify
query: Show the shipment tracking number and carrier for orders with
  fulfillment_status:shipped and updated_at:>=2026-06-07.
operation: |
  query {
    orders(first: 10, query: "updated_at:>=2026-06-07 fulfillment_status:shipped") {
      nodes {
        fulfillments(first: 10) {
          trackingInfo(first: 10) {
            number
            company
          }
        }
      }
    }
  }
targetFields:
  - FulfillmentTrackingInfo.number
  - FulfillmentTrackingInfo.company
targetTypes:
  - FulfillmentTrackingInfo
mustInclude:
  - QueryRoot.orders
  - Order.fulfillments
  - Fulfillment.trackingInfo
  - FulfillmentTrackingInfo.number
  - FulfillmentTrackingInfo.company
  - Fulfillment.trackingInfo(first:)
  - Order.fulfillments(first:)
  - QueryRoot.orders(first:)
  - QueryRoot.orders(query:)
mustExclude:
  - Mutation
notes: Today's shipments — tracking number and carrier per shipped line item.
answerSchema:
  type: object
  properties:
    shipments:
      type: array
      items:
        type: object
        properties:
          trackingNumber:
            type: string
          carrier:
            type: string
        required:
          - trackingNumber
          - carrier
        additionalProperties: false
  required:
    - shipments
  additionalProperties: false
