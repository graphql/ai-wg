id: shop-038
schemaId: shopify
query: Show me how product translations look for our French and German storefronts.
operation: |
  query {
    products(first: 5) {
      nodes {
        french: translations(locale: "fr") {
          key
          locale
          value
        }
        german: translations(locale: "de") {
          key
          locale
          value
        }
      }
    }
  }
targetFields:
  - Translation.key
  - Translation.locale
  - Translation.value
targetTypes:
  - Translation
mustInclude:
  - QueryRoot.products
  - Product.translations
  - Translation.key
  - Translation.locale
  - Translation.value
  - Product.translations(locale:)
  - QueryRoot.products(first:)
mustExclude:
  - Mutation
notes: Product translations for non-English storefronts.
answerSchema:
  type: object
  properties:
    products:
      type: array
      items:
        type: object
        properties:
          french:
            type: array
            items:
              type: object
              properties:
                key:
                  type: string
                locale:
                  type: string
                value:
                  type: string
              required:
                - key
                - locale
                - value
              additionalProperties: false
          german:
            type: array
            items:
              type: object
              properties:
                key:
                  type: string
                locale:
                  type: string
                value:
                  type: string
              required:
                - key
                - locale
                - value
              additionalProperties: false
        required:
          - french
          - german
        additionalProperties: false
  required:
    - products
  additionalProperties: false
