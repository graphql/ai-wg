id: shop-042
schemaId: shopify
query: Find customers whose carts were abandoned after 2026-06-05
  (created_at:>2026-06-05) — show the checkout URL, time, and customer details.
operation: |
  query {
    abandonedCheckouts(first: 10, query: "created_at:>2026-06-05") {
      nodes {
        abandonedCheckoutUrl
        createdAt
        customer {
          displayName
          email
        }
      }
    }
  }
targetFields:
  - AbandonedCheckout.abandonedCheckoutUrl
  - AbandonedCheckout.createdAt
  - Customer.displayName
  - Customer.email
targetTypes:
  - AbandonedCheckout
  - Customer
mustInclude:
  - QueryRoot.abandonedCheckouts
  - AbandonedCheckout.abandonedCheckoutUrl
  - AbandonedCheckout.createdAt
  - AbandonedCheckout.customer
  - Customer.displayName
  - Customer.email
  - QueryRoot.abandonedCheckouts(first:)
  - QueryRoot.abandonedCheckouts(query:)
mustExclude:
  - Mutation
notes: Abandoned carts within the past 48 hours.
answerSchema:
  type: object
  properties:
    abandonedCheckouts:
      type: array
      items:
        type: object
        properties:
          checkoutUrl:
            type: string
          createdAt:
            type: string
          customerName:
            type: string
          customerEmail:
            type: string
        required:
          - checkoutUrl
          - createdAt
          - customerName
          - customerEmail
        additionalProperties: false
  required:
    - abandonedCheckouts
  additionalProperties: false
