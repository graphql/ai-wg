id: gh-ext-003
schemaId: github
query: List pull requests in the octocat/example repository with the files
  changed in each.
operation: |
  query {
    repository(name: "example", owner: "octocat") {
      pullRequests(first: 10) {
        nodes {
          number
          title
          files(first: 10) {
            nodes {
              path
            }
          }
        }
      }
    }
  }
targetFields:
  - PullRequest.number
  - PullRequest.title
  - PullRequestChangedFile.path
targetTypes:
  - PullRequest
  - PullRequestChangedFile
mustInclude:
  - Query.repository
  - Repository.pullRequests
  - PullRequest.number
  - PullRequest.title
  - PullRequest.files
  - PullRequestChangedFile.path
  - PullRequest.files(first:)
  - Query.repository(name:)
  - Query.repository(owner:)
  - Repository.pullRequests(first:)
mustExclude:
  - Mutation
notes: Search across PRs and filter by a specific changed file path.
answerSchema:
  type: object
  properties:
    pullRequests:
      type: array
      items:
        type: object
        properties:
          number:
            type: integer
          title:
            type: string
          changedFiles:
            type: array
            items:
              type: string
        required:
          - number
          - title
          - changedFiles
        additionalProperties: false
  required:
    - pullRequests
  additionalProperties: false
answer:
