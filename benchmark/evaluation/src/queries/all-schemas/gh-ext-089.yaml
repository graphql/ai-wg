id: gh-ext-089
schemaId: github
query: Which users have pending membership invitations to the octocat organization?
operation: |
  query {
    organization(login: "octocat") {
      pendingMembers(first: 10) {
        nodes {
          login
        }
      }
    }
  }
targetFields:
  - User.login
targetTypes:
  - User
  - Organization
mustInclude:
  - Query.organization
  - Organization.pendingMembers
  - UserConnection.nodes
  - User.login
  - Organization.pendingMembers(first:)
  - Query.organization(login:)
mustExclude:
  - Mutation
notes: Organization pending member invitations.
answerSchema:
  type: object
  properties:
    pendingMembers:
      type: array
      items:
        type: string
  required:
    - pendingMembers
  additionalProperties: false
answer:
  pendingMembers:
    - frank
    - grace