id: shop-056
schemaId: shopify
query: List dispute or chargeback cases tied to recent orders.
operation: |
  query {
    orders(first: 10) {
      nodes {
        disputes {
          id
          initiatedAs
          status
        }
      }
    }
  }
targetFields:
  - OrderDisputeSummary.initiatedAs
  - OrderDisputeSummary.status
targetTypes:
  - OrderDisputeSummary
mustInclude:
  - QueryRoot.orders
  - Order.disputes
  - OrderDisputeSummary.initiatedAs
  - OrderDisputeSummary.status
  - QueryRoot.orders(first:)
mustExclude:
  - Mutation
notes: Disputes and chargebacks attached to recent orders.
answerSchema:
  type: object
  properties:
    disputes:
      type: array
      items:
        type: object
        properties:
          id:
            type: string
          initiatedAs:
            type: string
          status:
            type: string
        required:
          - id
          - initiatedAs
          - status
        additionalProperties: false
  required:
    - disputes
  additionalProperties: false
