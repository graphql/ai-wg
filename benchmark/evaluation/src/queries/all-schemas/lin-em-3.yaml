answerSchema:
  type: object
  properties:
    projects:
      type: array
      items:
        type: object
        properties:
          name:
            type: string
          teams:
            type: array
            items:
              type: object
              properties:
                name:
                  type: string
              required:
                - name
              additionalProperties: false
          lead:
            type:
              - object
              - "null"
            properties:
