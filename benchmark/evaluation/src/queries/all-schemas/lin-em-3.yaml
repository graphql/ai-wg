id: lin-em-3
schemaId: linear
query: Show me cross-team projects with their leads and target completion dates.
operation: |
  query {
    projects(first: 10) {
      nodes {
        name
        teams(first: 10) {
          nodes {
            name
          }
        }
        lead {
          name
        }
        targetDate
      }
    }
  }
