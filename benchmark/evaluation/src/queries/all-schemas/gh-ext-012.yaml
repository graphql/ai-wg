id: gh-ext-012
schemaId: github
query: List pull requests in the octocat/example repository with their review
  threads and whether each thread is resolved.
operation: |
  query {
    repository(name: "example", owner: "octocat") {
      pullRequests(first: 10) {
        nodes {
          number
          title
          reviewThreads(first: 10) {
            nodes {
              isResolved
            }
          }
        }
      }
    }
  }
targetFields:
  - PullRequest.number
  - PullRequest.title
  - PullRequestReviewThread.isResolved
targetTypes:
  - PullRequest
  - PullRequestReviewThread
mustInclude:
  - Query.repository
  - Repository.pullRequests
  - PullRequest.number
  - PullRequest.title
  - PullRequest.reviewThreads
  - PullRequestReviewThread.isResolved
  - Repository.pullRequests(first:)
  - PullRequest.reviewThreads(first:)
  - Query.repository(name:)
  - Query.repository(owner:)
mustExclude:
  - Mutation
notes: List pull requests and their review threads; caller filters by isResolved
  to identify which PRs have unresolved threads.
answerSchema:
  type: object
  properties:
    pullRequests:
      type: array
      items:
        type: object
        properties:
          number:
            type: integer
          title:
            type: string
          reviewThreads:
            type: array
            items:
              type: object
              properties:
                isResolved:
                  type: boolean
              required:
                - isResolved
              additionalProperties: false
        required:
          - number
          - title
          - reviewThreads
        additionalProperties: false
  required:
    - pullRequests
  additionalProperties: false
answer:
