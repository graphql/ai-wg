id: glab-038
schemaId: gitlab
query: List CI runners with their id, description, maximumTimeout, and currently
  running jobs (id, name, duration).
operation: |
  query {
    runners(first: 10) {
      nodes {
        id
        description
        maximumTimeout
        jobs(statuses: [RUNNING], first: 10) {
          nodes {
            ... on CiJob {
              id
              name
              duration
            }
          }
        }
      }
    }
  }
targetFields:
  - CiRunner.id
  - CiRunner.description
  - CiRunner.maximumTimeout
  - CiJob.id
  - CiJob.name
  - CiJob.duration
targetTypes:
  - CiRunner
  - CiJob
mustInclude:
  - Query.runners
  - CiRunner.id
  - CiRunner.description
  - CiRunner.maximumTimeout
  - CiRunner.jobs
  - CiJob.duration
  - CiRunner.jobs(statuses:)
  - CiRunner.jobs(first:)
  - Query.runners(first:)
mustExclude:
  - Mutation
notes: "DevOps: runners with long-running jobs."
answerSchema:
  type: object
  properties:
    runners:
      type: array
      items:
        type: object
        properties:
          id:
            type: string
          description:
            type: string
          maximumTimeout:
            type: integer
          jobs:
            type: array
            items:
              type: object
              properties:
                name:
                  type: string
                duration:
                  type: integer
              required:
                - name
                - duration
              additionalProperties: false
        required:
          - id
          - description
          - maximumTimeout
          - jobs
        additionalProperties: false
  required:
    - runners
  additionalProperties: false
