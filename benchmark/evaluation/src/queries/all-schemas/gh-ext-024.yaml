id: gh-ext-024
schemaId: github
query: >-
  For the HEAD commit of the octocat/example repository, list the workflow run
  number and check suite conclusion for each check suite.
operation: |
  query {
    repository(name: "example", owner: "octocat") {
      object(expression: "HEAD") {
        ... on Commit {
          checkSuites(first: 10) {
            nodes {
              conclusion
              workflowRun {
                runNumber
              }
            }
          }
        }
      }
    }
  }
targetFields:
  - WorkflowRun.runNumber
  - CheckSuite.conclusion
targetTypes:
  - WorkflowRun
  - CheckSuite
mustInclude:
  - Query.repository
  - Repository.object
  - Commit.checkSuites
  - CheckSuite.workflowRun
  - WorkflowRun.runNumber
  - CheckSuite.conclusion
  - Commit.checkSuites(first:)
  - Query.repository(name:)
  - Query.repository(owner:)
  - Repository.object(expression:)
mustExclude:
  - Mutation
answer:
  checkSuites:
    - workflowRunNumber: 42
      conclusion: null
    - workflowRunNumber: 43
      conclusion: null
    - workflowRunNumber: 44
      conclusion: null
    - workflowRunNumber: 41
      conclusion: SUCCESS
    - workflowRunNumber: 45
      conclusion: null
answerSchema:
  type: object
  properties:
    checkSuites:
      type: array
      items:
        type: object
        properties:
          workflowRunNumber:
            type: integer
          conclusion:
            type: string
        required:
          - workflowRunNumber
          - conclusion
        additionalProperties: false
  required:
    - checkSuites
  additionalProperties: false
notes: >-
  Retrieve check suites for the HEAD commit via repository.object;
  workflowRun.runNumber identifies the run and conclusion carries the check
  suite outcome.
