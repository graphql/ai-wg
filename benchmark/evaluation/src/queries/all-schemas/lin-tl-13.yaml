id: lin-tl-13
schemaId: linear
query: "Which workflow states does the team with ID \"team-design\" use?"
operation: |
  query {
    team(id: "team-design") {
      states(first: 10) {
        nodes {
          name
          color
          type
        }
      }
    }
  }
targetFields:
  - WorkflowState.name
  - WorkflowState.color
  - WorkflowState.type
targetTypes:
  - WorkflowState
  - Team
mustInclude:
  - Query.team
  - Team.states
  - WorkflowState.name
  - WorkflowState.color
  - WorkflowState.type
  - Query.team(id:)
  - Team.states(first:)
mustExclude:
  - Mutation
notes: Per-team workflow customization.
answerSchema:
  type: object
  properties:
    workflowStates:
      type: array
      items:
        type: object
        properties:
          name: &a1
            type: string
          color: *a1
          type: *a1
        required:
          - name
          - color
          - type
        additionalProperties: false
  required:
    - workflowStates
  additionalProperties: false
answer:
  workflowStates:
    - name: Backlog
      color: "#c4c4c4"
      type: unstarted
    - name: Complete
      color: "#27ae60"
      type: completed