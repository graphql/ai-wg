id: glab-069-kw
schemaId: gitlab
query: container scanning findings last
operation: |
  query {
    project(fullPath: "group/project") {
      vulnerabilities(first: 10) {
        nodes {
          reportType
        }
      }
    }
  }
targetFields:
  - Vulnerability.reportType
targetTypes:
  - Vulnerability
mustInclude:
  - Query.project
  - Project.vulnerabilities
  - Vulnerability.reportType
  - Project.vulnerabilities(first:)
  - Query.project(fullPath:)
mustExclude:
  - Mutation
notes: "Keyword variant of glab-069. Security: container scan findings."
