id: glab-045-kw
schemaId: gitlab
query: deployments pending approval
operation: |
  query {
    project(fullPath: "group/project") {
      environment {
        deployments(first: 10) {
          nodes {
            pendingApprovalCount
          }
        }
      }
    }
  }
targetFields:
  - Deployment.pendingApprovalCount
targetTypes:
  - Deployment
mustInclude:
  - Query.project
  - Project.environment
  - Environment.deployments
  - Deployment.pendingApprovalCount
  - Environment.deployments(first:)
  - Query.project(fullPath:)
mustExclude:
  - Mutation
notes: "Keyword variant of glab-045. DevOps: deployments pending approval."
