id: shop-017
schemaId: shopify
query: List orders with multiple shipping destinations so I can split the fulfillment.
operation: |
  query {
    orders(first: 10) {
      nodes {
        name
        fulfillmentOrders(first: 10) {
          nodes {
            destination {
              address1
              city
              firstName
              lastName
            }
          }
        }
      }
    }
  }
targetFields: []
targetTypes: []
mustInclude:
  - QueryRoot.orders
  - Order.name
  - Order.fulfillmentOrders
  - FulfillmentOrder.destination
  - FulfillmentOrderDestination.address1
  - Order.fulfillmentOrders(first:)
  - QueryRoot.orders(first:)
mustExclude:
  - Mutation
notes: Orders with multiple shipping destinations so fulfillment can be split.
answerSchema:
  type: object
  properties:
    orders:
      type: array
      items:
        type: object
        properties:
          name:
            type: string
          destinations:
            type: array
            items:
              type: object
              properties:
                address1:
                  type: string
                city:
                  type: string
                firstName:
                  type: string
                lastName:
                  type: string
              required:
                - address1
                - city
                - firstName
                - lastName
              additionalProperties: false
        required:
          - name
          - destinations
        additionalProperties: false
  required:
    - orders
  additionalProperties: false
