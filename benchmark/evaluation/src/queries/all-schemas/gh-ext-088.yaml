id: gh-ext-088
schemaId: github
query: What repositories does the team with slug "example" in the octocat
  organization have access to, and with what permission?
operation: |
  query {
    organization(login: "octocat") {
      team(slug: "example") {
        repositories(first: 10) {
          edges {
            permission
            node {
              name
            }
          }
        }
      }
    }
  }
targetFields:
  - TeamRepositoryEdge.permission
  - Repository.name
targetTypes:
  - Team
mustInclude:
  - Query.organization
  - Organization.team
  - Team.repositories
  - TeamRepositoryConnection.edges
  - TeamRepositoryEdge.permission
  - TeamRepositoryEdge.node
  - Repository.name
  - Organization.team(slug:)
  - Query.organization(login:)
  - Team.repositories(first:)
mustExclude:
  - Mutation
notes: Team-repository edges with their permission level.
answerSchema:
  type: object
  properties:
    repositories:
      type: array
      items:
        type: object
        properties:
          name:
            type: string
          permission:
            type: string
        required:
          - name
          - permission
        additionalProperties: false
  required:
    - repositories
  additionalProperties: false
answer:
  repositories:
    - name: example
      permission: WRITE
    - name: Hello-World
      permission: READ