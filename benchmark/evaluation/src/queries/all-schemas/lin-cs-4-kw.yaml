id: lin-cs-4-kw
schemaId: linear
query: support tickets attachments issues
operation: |
  query {
    attachments(first: 10) {
      nodes {
        title
        url
        issue {
          id
        }
        sourceType
      }
    }
  }
targetFields:
  - Attachment.title
  - Attachment.url
  - Attachment.sourceType
targetTypes:
  - Attachment
mustInclude:
  - Query.attachments
  - Attachment.title
  - Attachment.url
  - Attachment.issue
  - Attachment.sourceType
  - Query.attachments(first:)
mustExclude:
  - Mutation
notes: Keyword variant of lin-cs-4. Support tickets attached to issues (e.g. Zendesk).
