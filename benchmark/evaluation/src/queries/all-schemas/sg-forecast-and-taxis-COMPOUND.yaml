id: sg-forecast-and-taxis-COMPOUND
schemaId: singapore
query: What is the forecast for the central region and how many taxis are available?
operation: |
  query {
    regionByName(name: CENTRAL) {
      name
      forecast {
        forecast
        temperatureHigh
        temperatureLow
        humidityHigh
        humidityLow
        windDirection
        windSpeed
      }
    }
    totalAvailableTaxis
  }
targetFields:
  - RegionForecast.forecast
  - Query.totalAvailableTaxis
targetTypes:
  - Region
  - RegionForecast
mustInclude:
  - Query.regionByName
  - Region.forecast
  - Query.totalAvailableTaxis
  - Query.regionByName(name:)
mustExclude: []
shouldInclude:
  - RegionForecast
notes: Intentionally compound. The eval runner invokes the algorithm once per
  subQuery; results are unioned before metric calculation. Tests the
  caller-splits contract.
answerSchema:
  type: object
  properties:
    forecast:
      type: object
      properties:
        forecast:
          type: string
        temperatureHigh:
          type: integer
        temperatureLow:
          type: integer
        humidityHigh:
          type: integer
        humidityLow:
          type: integer
        windDirection:
          type: string
        windSpeed:
          type: string
      required:
        - forecast
        - temperatureHigh
        - temperatureLow
        - humidityHigh
        - humidityLow
        - windDirection
        - windSpeed
      additionalProperties: false
    availableTaxis:
      type: integer
  required:
    - forecast
    - availableTaxis
  additionalProperties: false
answer:
  forecast:
    forecast: Partly cloudy with isolated showers
    temperatureHigh: 637
    temperatureLow: 947
    humidityHigh: 288
    humidityLow: 788
    windDirection: Southwest
    windSpeed: "12"
  availableTaxis: 496
