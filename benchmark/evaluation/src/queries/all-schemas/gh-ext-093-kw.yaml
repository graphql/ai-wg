id: gh-ext-093-kw
schemaId: github
query: enterprise billing seats
operation: |
  query {
    enterprise(slug: "example") {
      billingInfo {
        allLicensableUsersCount
        totalLicenses
      }
    }
  }
targetFields:
  - EnterpriseBillingInfo.allLicensableUsersCount
  - EnterpriseBillingInfo.totalLicenses
targetTypes:
  - EnterpriseBillingInfo
  - Enterprise
mustInclude:
  - Query.enterprise
  - Enterprise.billingInfo
  - EnterpriseBillingInfo.allLicensableUsersCount
  - EnterpriseBillingInfo.totalLicenses
  - Query.enterprise(slug:)
mustExclude:
  - Mutation
notes: Keyword variant of gh-ext-093. Enterprise billing info with licensable user counts.
