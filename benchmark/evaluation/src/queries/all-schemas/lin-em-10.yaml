id: lin-em-10
schemaId: linear
query: "Give me a snapshot of the organization: users and teams."
operation: |
  query {
    organization {
      users(first: 10) {
        nodes {
          id
          name
          email
        }
      }
      teams(first: 10) {
        nodes {
          id
          name
          key
        }
      }
    }
  }
targetFields:
  - User.name
  - User.email
  - Team.name
  - Team.key
targetTypes:
  - Organization
mustInclude:
  - Query.organization
  - Organization.users
  - Organization.teams
  - Organization.teams(first:)
  - Organization.users(first:)
  - User.name
  - User.email
  - Team.name
  - Team.key
mustExclude:
  - Mutation
notes: Org structure snapshot.
answerSchema:
  type: object
  properties:
    users:
      type: array
      items:
        type: object
        properties:
          name:
            type: string
          email:
            type: string
        required:
          - name
          - email
        additionalProperties: false
    teams:
      type: array
      items:
        type: object
        properties:
          name:
            type: string
          key:
            type: string
        required:
          - name
          - key
        additionalProperties: false
  required:
    - users
    - teams
  additionalProperties: false
