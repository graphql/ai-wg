id: shop-028
schemaId: shopify
query: List the first 10 product variants showing each variant's SKU and its
  inventory quantity breakdown by location.
operation: |
  query {
    productVariants(first: 10) {
      nodes {
        sku
        inventoryItem {
          inventoryLevels(first: 10) {
            nodes {
              location {
                name
              }
              quantities(names: ["available"]) {
                name
                quantity
              }
            }
          }
        }
      }
    }
  }
targetFields:
  - ProductVariant.sku
  - Location.name
  - InventoryQuantity.quantity
targetTypes:
  - ProductVariant
  - InventoryLevel
  - InventoryQuantity
mustInclude:
  - QueryRoot.productVariants
  - QueryRoot.productVariants(first:)
  - ProductVariant.sku
  - ProductVariant.inventoryItem
  - InventoryItem.inventoryLevels
  - InventoryItem.inventoryLevels(first:)
  - InventoryLevel.location
  - InventoryLevel.quantities
  - InventoryLevel.quantities(names:)
  - Location.name
  - InventoryQuantity.quantity
mustExclude:
  - Mutation
notes: Lists product variants with inventory quantities broken down by location.
answerSchema:
  type: object
  properties:
    variants:
      type: array
      items:
        type: object
        properties:
          sku:
            type: string
          locations:
            type: array
            items:
              type: object
              properties:
                location:
                  type: string
                quantities:
                  type: array
                  items:
                    type: object
                    properties:
                      name:
                        type: string
                      quantity:
                        type: integer
                    required:
                      - name
                      - quantity
                    additionalProperties: false
              required:
                - location
                - quantities
              additionalProperties: false
        required:
          - sku
          - locations
        additionalProperties: false
  required:
    - variants
  additionalProperties: false
