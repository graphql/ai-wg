id: shop-020
schemaId: shopify
query: Which orders are on hold and what is the reason for the hold?
operation: |
  query {
    orders(first: 10) {
      nodes {
        name
        fulfillmentOrders(first: 10) {
          nodes {
            fulfillmentHolds {
              reason
            }
          }
        }
      }
    }
  }
targetFields:
  - Order.name
  - FulfillmentHold.reason
targetTypes:
  - Order
  - FulfillmentHold
mustInclude:
  - QueryRoot.orders
  - Order.name
  - Order.fulfillmentOrders
  - FulfillmentOrder.fulfillmentHolds
  - FulfillmentHold.reason
  - Order.fulfillmentOrders(first:)
  - QueryRoot.orders(first:)
mustExclude:
  - Mutation
notes: Fulfillment orders on hold and the reason for the hold.
answerSchema:
  type: object
  properties:
    orders:
      type: array
      items:
        type: object
        properties:
          name:
            type: string
          holdReasons:
            type: array
            items:
              type: string
        required:
          - name
          - holdReasons
        additionalProperties: false
  required:
    - orders
  additionalProperties: false
