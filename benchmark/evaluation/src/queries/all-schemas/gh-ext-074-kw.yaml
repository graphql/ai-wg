id: gh-ext-074-kw
schemaId: github
query: discussion categories repository
operation: |
  query {
    repository(name: "example", owner: "octocat") {
      discussionCategories(first: 10) {
        nodes {
          name
          description
        }
      }
    }
  }
targetFields:
  - DiscussionCategory.name
  - DiscussionCategory.description
targetTypes:
  - DiscussionCategory
  - Discussion
  - Repository
mustInclude:
  - Query.repository
  - Repository.discussionCategories
  - DiscussionCategoryConnection.nodes
  - DiscussionCategory.name
  - DiscussionCategory.description
  - Query.repository(name:)
  - Query.repository(owner:)
  - Repository.discussionCategories(first:)
mustExclude:
  - Mutation
notes: Keyword variant of gh-ext-074. List discussion categories in a repo.
