id: lin-em-9
schemaId: linear
query: "How is open work distributed across all engineers in the org?"
operation: |
  query {
    users(first: 10) {
      nodes {
        name
        assignedIssues(first: 10, filter: { state: { type: { in: ["unstarted", "started"] } } }) {
          nodes {
            title
            priority
          }
        }
      }
    }
  }
targetFields:
  - User.name
  - Issue.title
  - Issue.priority
targetTypes:
  - User
  - Issue
mustInclude:
  - Query.users
  - User.name
  - User.assignedIssues
  - Issue.title
  - Issue.priority
  - Query.users(first:)
  - User.assignedIssues(first:)
  - User.assignedIssues(filter:)
mustExclude:
  - Mutation
notes: Load distribution across all engineers org-wide.
