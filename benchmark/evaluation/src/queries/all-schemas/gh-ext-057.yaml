id: gh-ext-057
schemaId: github
query: What is the star count and fork count of the octocat/example repository,
  and is it a fork of another repository?
operation: |
  query {
    repository(name: "example", owner: "octocat") {
      nameWithOwner
      stargazerCount
      forkCount
      isFork
    }
  }
targetFields:
  - Repository.nameWithOwner
  - Repository.stargazerCount
  - Repository.forkCount
  - Repository.isFork
targetTypes:
  - Repository
mustInclude:
  - Query.repository
  - Repository.nameWithOwner
  - Repository.stargazerCount
  - Repository.forkCount
  - Repository.isFork
  - Query.repository(name:)
  - Query.repository(owner:)
mustExclude:
  - Mutation
answerSchema:
  type: object
  properties:
    stargazerCount:
      type: number
    forkCount:
      type: number
    isFork:
      type: boolean
  required:
    - stargazerCount
    - forkCount
    - isFork
  additionalProperties: false
answer:
  stargazerCount: 102
  forkCount: 225
  isFork: false