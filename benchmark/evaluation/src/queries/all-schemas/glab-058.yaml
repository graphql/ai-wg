id: glab-058
schemaId: gitlab
query: List the vulnerabilities reported in the gitlab-org/gitlab project
  (title, severity, state, and report type).
operation: |
  query {
    project(fullPath: "gitlab-org/gitlab") {
      vulnerabilities(first: 5) {
        nodes {
          title
          severity
          state
          reportType
        }
      }
    }
  }
targetFields:
  - Vulnerability.title
  - Vulnerability.severity
  - Vulnerability.state
  - Vulnerability.reportType
targetTypes:
  - Project
  - Vulnerability
mustInclude:
  - Query.project
  - Project.vulnerabilities
  - Vulnerability.title
  - Vulnerability.severity
  - Vulnerability.state
  - Vulnerability.reportType
  - Query.project(fullPath:)
  - Project.vulnerabilities(first:)
mustExclude:
  - Mutation
notes: "Security: vulnerabilities reported in a project, with their report type."
answerSchema:
  type: object
  properties:
    vulnerabilities:
      type: array
      items:
        type: object
        properties:
          title: &a1
            type: string
          severity: *a1
          state: *a1
          reportType: *a1
        required:
          - title
          - severity
          - state
          - reportType
        additionalProperties: false
  required:
    - vulnerabilities
  additionalProperties: false
answer:
  vulnerabilities:
    - title: Weak password hashing algorithm detected
      severity: CRITICAL
      state: CONFIRMED
      reportType: DEPENDENCY_SCANNING
    - title: SQL Injection in user input validation
      severity: UNKNOWN
      state: CONFIRMED
      reportType: CONTAINER_SCANNING
    - title: Missing authentication on admin endpoints
      severity: UNKNOWN
      state: CONFIRMED
      reportType: SARIF
    - title: Cross-Site Scripting vulnerability in comments
      severity: LOW
      state: DETECTED
      reportType: GENERIC
    - title: Hardcoded API credentials in source code
      severity: HIGH
      state: DETECTED
      reportType: CONTAINER_SCANNING_FOR_REGISTRY
