id: shop-050
schemaId: shopify
query: Pull all refund line items for order gid://shopify/Object/1 to confirm
  what was refunded.
operation: |
  query {
    order(id: "gid://shopify/Object/1") {
      refunds(first: 10) {
        refundLineItems(first: 10) {
          nodes {
            quantity
            priceSet {
              shopMoney {
                amount
              }
            }
            lineItem {
              name
            }
          }
        }
      }
    }
  }
targetFields:
  - RefundLineItem.quantity
  - RefundLineItem.priceSet
  - LineItem.name
targetTypes: []
mustInclude:
  - QueryRoot.order
  - Order.refunds
  - Refund.refundLineItems
  - RefundLineItem.quantity
  - RefundLineItem.priceSet
  - RefundLineItem.lineItem
  - LineItem.name
  - Order.refunds(first:)
  - QueryRoot.order(id:)
  - Refund.refundLineItems(first:)
mustExclude:
  - Mutation
notes: All refund line items for a single order.
answerSchema:
  type: object
  properties:
    refundLineItems:
      type: array
      items:
        type: object
        properties:
          lineItem:
            type: string
          quantity:
            type: integer
          amount:
            type: string
        required:
          - lineItem
          - quantity
          - amount
        additionalProperties: false
  required:
    - refundLineItems
  additionalProperties: false
answer:
