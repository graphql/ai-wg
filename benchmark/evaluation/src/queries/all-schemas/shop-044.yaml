id: shop-044
schemaId: shopify
query: Show me customers who have opted out of marketing emails.
operation: |
  query {
    customers(first: 10, query: "emailMarketingConsent.marketingState:UNSUBSCRIBED") {
      nodes {
        defaultEmailAddress {
          emailAddress
          marketingState
        }
      }
    }
  }
targetFields:
  - CustomerEmailAddress.emailAddress
  - CustomerEmailAddress.marketingState
targetTypes:
  - Customer
  - CustomerEmailAddress
mustInclude:
  - QueryRoot.customers
  - Customer.defaultEmailAddress
  - CustomerEmailAddress.emailAddress
  - CustomerEmailAddress.marketingState
  - QueryRoot.customers(first:)
  - QueryRoot.customers(query:)
mustExclude:
  - Mutation
notes: Customers who have opted out of marketing emails (UNSUBSCRIBED state).
answerSchema:
  type: object
  properties:
    customers:
      type: array
      items:
        type: object
        properties:
          email:
            type: string
        required:
          - email
        additionalProperties: false
  required:
    - customers
  additionalProperties: false
answer:
  customers:
    - email: work.email@company.com
    - email: orders@example.com