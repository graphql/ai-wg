      totalDuties:
        amount: "135.75"
        currencyCode: TJS
    - additionalFees:
        - name: Gift Message Card
          amount: "34.50"
          currencyCode: ILS
        - name: Assembly Fee
          amount: "49.99"
          currencyCode: DJF
      totalDuties:
        amount: "44.99"
