id: shop-018
schemaId: shopify
query: What additional fees and total duties are recorded on each order — show
  additionalFees and currentTotalDutiesSet?
operation: |
  query {
    orders(first: 10) {
      nodes {
        additionalFees {
          id
          name
          price {
            presentmentMoney {
              amount
              currencyCode
            }
          }
        }
        currentTotalDutiesSet {
          presentmentMoney {
            amount
            currencyCode
          }
        }
      }
    }
  }
targetFields: []
targetTypes: []
mustInclude:
  - QueryRoot.orders
  - Order.additionalFees
  - Order.currentTotalDutiesSet
  - QueryRoot.orders(first:)
  - AdditionalFee.name
  - AdditionalFee.price
mustExclude:
  - Mutation
notes: Duty and import fees on international orders this quarter.
answerSchema:
  type: object
  properties:
    orders:
      type: array
      items:
        type: object
        properties:
          additionalFees:
            type: array
            items:
              type: object
              properties:
                name:
                  type: string
                amount:
                  type: string
                currencyCode:
                  type: string
              required:
                - name
                - amount
                - currencyCode
              additionalProperties: false
          totalDuties:
            type: object
            properties:
              amount:
                type: string
              currencyCode:
                type: string
            required:
              - amount
              - currencyCode
            additionalProperties: false
        required:
          - additionalFees
          - totalDuties
        additionalProperties: false
  required:
    - orders
  additionalProperties: false
answer:
