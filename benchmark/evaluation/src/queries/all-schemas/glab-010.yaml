id: glab-010
schemaId: gitlab
query: What was the head CI pipeline duration for merge request
  gid://gitlab/MergeRequest/1?
operation: |
  query {
    mergeRequest(id: "gid://gitlab/MergeRequest/1") {
      headPipeline {
        duration
      }
    }
  }
targetFields:
  - Pipeline.duration
targetTypes:
  - Pipeline
mustInclude:
  - Query.mergeRequest
  - MergeRequest.headPipeline
  - Pipeline.duration
  - Query.mergeRequest(id:)
mustExclude:
  - Mutation
notes: "Developer: pipeline duration on a single MR."
answerSchema:
  type: object
  properties:
    headPipelineDuration:
      type: integer
  required:
    - headPipelineDuration
  additionalProperties: false
answer:
  headPipelineDuration: 501
