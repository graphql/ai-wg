id: gh-ext-071-kw
schemaId: github
query: repository topics tags
operation: |
  query {
    viewer {
      repositories(first: 10) {
        nodes {
          repositoryTopics(first: 10) {
            nodes {
              topic {
                name
              }
            }
          }
        }
      }
    }
  }
targetFields:
  - Topic.name
targetTypes:
  - Topic
  - Repository
  - Tag
mustInclude:
  - Query.viewer
  - User.repositories
  - Repository.repositoryTopics
  - RepositoryTopic.topic
  - Topic.name
  - Repository.repositoryTopics(first:)
  - User.repositories(first:)
mustExclude:
  - Mutation
notes: Keyword variant of gh-ext-071. Repository topics per repo for the viewer.
