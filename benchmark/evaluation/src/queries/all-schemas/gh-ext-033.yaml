id: gh-ext-033
schemaId: github
query: What OIDC provider type is configured for the example enterprise?
operation: |
  query {
    enterprise(slug: "example") {
      ownerInfo {
        oidcProvider {
          providerType
        }
      }
    }
  }
targetFields:
  - OIDCProvider.providerType
targetTypes:
  - OIDCProvider
  - Deployment
mustInclude:
  - Query.enterprise
  - Enterprise.ownerInfo
  - EnterpriseOwnerInfo.oidcProvider
  - OIDCProvider.providerType
  - Query.enterprise(slug:)
mustExclude:
  - Mutation
notes: Inspect the enterprise OIDC provider configuration.
answerSchema:
  type: object
  properties:
    oidcProviderType:
      type: string
  required:
    - oidcProviderType
  additionalProperties: false
answer:
  oidcProviderType: AAD