id: lin-ic-18-kw
schemaId: linear
query: my issue drafts unfinished
operation: |
  query {
    viewer {
      drafts(first: 10) {
        nodes {
          id
        }
      }
    }
  }
targetFields:
  - IssueDraft.title
  - IssueDraft.updatedAt
targetTypes:
  - IssueDraft
mustInclude:
  - Query.viewer
  - User.drafts
  - IssueDraft.title
  - IssueDraft.updatedAt
  - User.drafts(first:)
mustExclude:
  - Mutation
