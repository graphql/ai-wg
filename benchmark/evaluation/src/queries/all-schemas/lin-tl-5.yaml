id: lin-tl-5
schemaId: linear
query: Show me velocity across our last few completed cycles.
operation: |
  query {
    cycles(first: 5, filter: { isPast: { eq: true } }) {
      nodes {
        completedAt
        completedScopeHistory
        scopeHistory
        team {
          id
        }
        startsAt
        endsAt
      }
    }
  }
targetFields:
  - Cycle.completedAt
  - Cycle.completedScopeHistory
  - Cycle.scopeHistory
  - Cycle.startsAt
  - Cycle.endsAt
targetTypes:
  - Cycle
mustInclude:
  - Query.cycles
  - Cycle.completedAt
  - Cycle.completedScopeHistory
  - Cycle.scopeHistory
  - Cycle.team
  - Cycle.startsAt
  - Cycle.endsAt
  - Query.cycles(first:)
  - Query.cycles(filter:)
mustExclude:
  - Mutation
notes: Multi-cycle velocity trend across recent cycles.
