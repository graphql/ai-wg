id: shop-029
schemaId: shopify
query: What does the compare-at price look like vs current price for all sale items?
operation: |
  query {
    products(first: 10, query: "is_price_reduced:true") {
      nodes {
        variants(first: 10) {
          nodes {
            compareAtPrice
            price
          }
        }
      }
    }
  }
targetFields:
  - ProductVariant.compareAtPrice
  - ProductVariant.price
targetTypes:
  - ProductVariant
mustInclude:
  - QueryRoot.products
  - QueryRoot.products(first:)
  - QueryRoot.products(query:)
  - ProductVariant.compareAtPrice
  - ProductVariant.price
  - Product.variants(first:)
mustExclude:
  - Mutation
notes: Compare-at price vs current price for sale items (is_price_reduced:true
  filter).
answerSchema:
  type: object
  properties:
    variants:
      type: array
      items:
        type: object
        properties:
          compareAtPrice:
            type: string
          price:
            type: string
        required:
          - compareAtPrice
          - price
        additionalProperties: false
  required:
    - variants
  additionalProperties: false
