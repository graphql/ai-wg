id: shop-052
schemaId: shopify
query: Which customers have abandoned checkouts that still have recovery URLs we
  can email?
operation: |
  query {
    abandonedCheckouts(first: 10) {
      nodes {
        abandonedCheckoutUrl
        customer {
          displayName
          email
        }
      }
    }
  }
targetFields:
  - AbandonedCheckout.abandonedCheckoutUrl
  - Customer.displayName
  - Customer.email
targetTypes:
  - AbandonedCheckout
  - Customer
mustInclude:
  - QueryRoot.abandonedCheckouts
  - AbandonedCheckout.abandonedCheckoutUrl
  - AbandonedCheckout.customer
  - QueryRoot.abandonedCheckouts(first:)
  - Customer.displayName
  - Customer.email
mustExclude:
  - Mutation
notes: Abandoned checkouts with recovery URLs to email customers.
answerSchema:
  type: object
  properties:
    customers:
      type: array
      items:
        type: object
        properties:
          displayName:
            type: string
          email:
            type: string
          recoveryUrl:
            type: string
        required:
          - displayName
          - email
          - recoveryUrl
        additionalProperties: false
  required:
    - customers
  additionalProperties: false
