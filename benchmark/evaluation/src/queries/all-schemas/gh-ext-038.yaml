id: gh-ext-038
schemaId: github
query: List the open pull requests in the octocat/example repository, including
  each PR's number, title, author login, creation date, and total review count.
operation: |
  query {
    repository(name: "example", owner: "octocat") {
      pullRequests(first: 10, states: [OPEN]) {
        nodes {
          number
          title
          author {
            login
          }
          createdAt
          reviews(first: 10) {
            totalCount
          }
        }
      }
    }
  }
targetFields:
  - PullRequest.number
  - PullRequest.title
  - Actor.login
  - PullRequest.createdAt
  - PullRequestReviewConnection.totalCount
targetTypes:
  - Actor
  - PullRequest
  - PullRequestReviewConnection
mustInclude:
  - Query.repository
  - Repository.pullRequests
  - PullRequest.number
  - PullRequest.title
  - PullRequest.author
  - Actor.login
  - PullRequest.createdAt
  - PullRequest.reviews
  - PullRequest.reviews(first:)
  - PullRequestReviewConnection.totalCount
  - Query.repository(name:)
  - Query.repository(owner:)
  - Repository.pullRequests(first:)
  - Repository.pullRequests(states:)
mustExclude:
  - Mutation
