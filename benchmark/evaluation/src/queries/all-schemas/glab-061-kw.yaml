id: glab-061-kw
schemaId: gitlab
query: dependency advisories project
operation: |
  query {
    project(fullPath: "group/project") {
      dependencies(first: 10) {
        nodes {
          __typename
        }
      }
    }
  }
targetFields: []
targetTypes:
  - Dependency
mustInclude:
  - Query.project
  - Project.dependencies
  - Project.dependencies(first:)
  - Query.project(fullPath:)
mustExclude:
  - Mutation
notes: "Keyword variant of glab-061. Security: dependencies with advisories."
