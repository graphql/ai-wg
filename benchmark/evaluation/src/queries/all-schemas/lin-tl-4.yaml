id: lin-tl-4
schemaId: linear
query: "Which issues are tracked by the Engineering team (team ID:
  team-engineering)? List each issue's key and title."
operation: |
  query {
    team(id: "team-engineering") {
      issues(first: 10) {
        nodes {
          identifier
          title
        }
      }
    }
  }
targetFields:
  - Issue.identifier
  - Issue.title
targetTypes:
  - Team
  - Issue
mustInclude:
  - Query.team
  - Team.issues
  - Issue.identifier
  - Issue.title
  - Query.team(id:)
  - Team.issues(first:)
mustExclude:
  - Mutation
notes: "Team issue list: fetches issues belonging to the Engineering team."
answerSchema:
  type: object
  properties:
    issues:
      type: array
      items:
        type: object
        properties:
          identifier: &a1
            type: string
          title: *a1
        required:
          - identifier
          - title
        additionalProperties: false
  required:
    - issues
  additionalProperties: false
answer:
