id: lin-pm-4
schemaId: linear
query: "List all customers, their needs (body), and the identifier and title of
  the issue linked to each need."
operation: |
  query {
    customers {
      nodes {
        name
        needs {
          body
          issue {
            identifier
            title
          }
        }
      }
    }
  }
targetFields:
  - Customer.name
  - CustomerNeed.body
  - Issue.identifier
  - Issue.title
targetTypes:
  - Customer
  - CustomerNeed
  - Issue
mustInclude:
  - Query.customers
  - Customer.name
  - Customer.needs
  - CustomerNeed.body
  - CustomerNeed.issue
  - Issue.identifier
  - Issue.title
mustExclude:
  - Mutation
notes: List all customers and their needs with linked issue context.
answerSchema:
  type: object
  properties:
    customers:
      type: array
      items:
        type: object
        properties:
          name:
            type: string
          needs:
            type: array
            items:
              type: object
              properties:
                body:
                  type: string
                issue:
                  type: object
                  properties:
                    identifier:
                      type: string
                    title:
                      type: string
                  required:
                    - identifier
                    - title
                  additionalProperties: false
              required:
                - body
                - issue
              additionalProperties: false
        required:
          - name
          - needs
        additionalProperties: false
  required:
    - customers
  additionalProperties: false
answer:
