id: gh-ext-007
schemaId: github
query: List merged pull requests in the octocat/example repository with their
  number, title, and merge timestamp.
operation: |
  query {
    repository(name: "example", owner: "octocat") {
      pullRequests(first: 10, states: [MERGED]) {
        nodes {
          number
          title
          mergedAt
        }
      }
    }
  }
targetFields:
  - PullRequest.number
  - PullRequest.title
  - PullRequest.mergedAt
targetTypes:
  - PullRequest
mustInclude:
  - Query.repository
  - Repository.pullRequests
  - PullRequest.number
  - PullRequest.title
  - PullRequest.mergedAt
  - Query.repository(name:)
  - Query.repository(owner:)
  - Repository.pullRequests(first:)
  - Repository.pullRequests(states:)
mustExclude:
  - Mutation
notes: The API has no merge-method filter; filtering by states MERGED is the
  closest faithful answer. Returns number, title, mergedAt for each merged PR.
answerSchema:
  type: object
  properties:
    mergedPullRequests:
      type: array
      items:
        type: object
        properties:
          number:
            type: integer
          title:
            type: string
          mergedAt:
            type: string
        required:
          - number
          - title
          - mergedAt
        additionalProperties: false
  required:
    - mergedPullRequests
  additionalProperties: false
answer:
  mergedPullRequests:
    - number: 3
      title: Update dependencies
      mergedAt: 2025-05-08T00:00:00.000Z
    - number: 7
      title: Add CI pipeline
      mergedAt: 2025-05-12T00:00:00.000Z
    - number: 10
      title: Refactor data layer
      mergedAt: 2025-05-12T00:00:00.000Z