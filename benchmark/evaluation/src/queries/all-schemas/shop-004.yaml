id: shop-004
schemaId: shopify
query: List the first 10 orders in the shop with their fulfillment status and
  each line item's name and unfulfilled quantity.
operation: |
  query {
    orders(first: 10) {
      nodes {
        name
        displayFulfillmentStatus
        lineItems(first: 10) {
          edges {
            node {
              name
              unfulfilledQuantity
            }
          }
        }
      }
    }
  }
targetFields:
  - Order.displayFulfillmentStatus
  - Order.name
  - LineItem.name
  - LineItem.unfulfilledQuantity
targetTypes:
  - Order
  - LineItem
mustInclude:
  - QueryRoot.orders
  - QueryRoot.orders(first:)
  - Order.name
  - Order.displayFulfillmentStatus
  - Order.lineItems
  - Order.lineItems(first:)
  - LineItem.name
  - LineItem.unfulfilledQuantity
mustExclude:
  - Mutation
notes: List orders with their fulfillment status and per-line unfulfilled quantities.
answerSchema:
  type: object
  properties:
    orders:
      type: array
      items:
        type: object
        properties:
          name:
            type: string
          fulfillmentStatus:
            type: string
          lineItems:
            type: array
            items:
              type: object
              properties:
                name:
                  type: string
                unfulfilledQuantity:
                  type: integer
              required:
                - name
                - unfulfilledQuantity
              additionalProperties: false
        required:
          - name
          - fulfillmentStatus
          - lineItems
        additionalProperties: false
  required:
    - orders
  additionalProperties: false
