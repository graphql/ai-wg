id: gh-ext-053
schemaId: github
query: What issue templates are available in the octocat/example repository?
operation: |
  query {
    repository(name: "example", owner: "octocat") {
      issueTemplates {
        name
        body
      }
    }
  }
targetFields:
  - IssueTemplate.name
  - IssueTemplate.body
targetTypes:
  - IssueTemplate
  - Issue
  - Repository
mustInclude:
  - Query.repository
  - Repository.issueTemplates
  - IssueTemplate.name
  - IssueTemplate.body
  - Query.repository(name:)
  - Query.repository(owner:)
mustExclude:
  - Mutation
notes: Issue templates available in the repository.
answerSchema:
  type: object
  properties:
    issueTemplates:
      type: array
      items:
        type: object
        properties:
          name:
            type: string
          body:
            type: string
        required:
          - name
          - body
        additionalProperties: false
  required:
    - issueTemplates
  additionalProperties: false
answer:
  issueTemplates:
    - name: Bug Report
      body: |
        ## Description
  
        ## Steps to Reproduce
    - name: Feature Request
      body: |
        ## Problem
  
        ## Proposed Solution