id: shop-030
schemaId: shopify
query: Show me products whose vendor is Acme so I can audit our supplier catalog.
operation: |
  query {
    products(first: 10, query: "vendor:Acme") {
      nodes {
        vendor
        title
      }
    }
  }
targetFields:
  - Product.vendor
  - Product.title
targetTypes:
  - Product
mustInclude:
  - QueryRoot.products
  - Product.vendor
  - Product.title
  - QueryRoot.products(first:)
  - QueryRoot.products(query:)
mustExclude:
  - Mutation
notes: Products supplied by a specific vendor.
answerSchema:
  type: object
  properties:
    products:
      type: array
      items:
        type: object
        properties:
          title:
            type: string
        required:
          - title
        additionalProperties: false
  required:
    - products
  additionalProperties: false
answer:
  products:
    - title: Phone Case
    - title: Leather Wallet
    - title: Wireless Headphones
    - title: Yoga Mat
    - title: Smart Watch