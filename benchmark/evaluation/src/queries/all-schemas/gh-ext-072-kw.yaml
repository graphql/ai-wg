id: gh-ext-072-kw
schemaId: github
query: answered discussions repository
operation: |
  query {
    repository(name: "example", owner: "octocat") {
      discussions(first: 10) {
        nodes {
          isAnswered
          answer {
            __typename
          }
        }
      }
    }
  }
targetFields:
  - Discussion.isAnswered
targetTypes:
  - Discussion
  - Repository
mustInclude:
  - Query.repository
  - Repository.discussions
  - Discussion.isAnswered
  - Discussion.answer
  - Query.repository(name:)
  - Query.repository(owner:)
  - Repository.discussions(first:)
mustExclude:
  - Mutation
notes: Keyword variant of gh-ext-072. Discussions filtered to those that have an answer.
