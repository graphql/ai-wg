id: lin-em-1
schemaId: linear
query: "What projects are on our roadmap this quarter and how are they tracking?"
operation: |
  query {
    roadmaps(first: 10) {
      nodes {
        projects(first: 10) {
          nodes {
            name
            targetDate
            health
            status {
              name
              type
            }
          }
        }
      }
    }
  }
targetFields:
  - Project.name
  - Project.targetDate
  - Project.health
  - Project.status
targetTypes:
  - Project
  - Roadmap
  - ProjectStatus
mustInclude:
  - Query.roadmaps
  - Roadmap.projects
  - Project.name
  - Project.targetDate
  - Project.health
  - Project.status
  - ProjectStatus.name
  - ProjectStatus.type
  - Query.roadmaps(first:)
  - Roadmap.projects(first:)
mustExclude:
  - Mutation
notes: EM roadmap view — projects with target dates and overall status.
answerSchema:
  type: object
  properties:
    roadmaps:
      type: array
      items:
        type: object
        properties:
          projects:
            type: array
            items:
              type: object
              properties:
                name:
                  type: string
                targetDate:
                  type: string
                health:
                  type: string
                status:
                  type: object
                  properties:
                    name:
                      type: string
                    type:
                      type: string
                  required:
                    - name
                    - type
                  additionalProperties: false
              required:
                - name
                - targetDate
                - health
                - status
              additionalProperties: false
        required:
          - projects
        additionalProperties: false
  required:
    - roadmaps
  additionalProperties: false
