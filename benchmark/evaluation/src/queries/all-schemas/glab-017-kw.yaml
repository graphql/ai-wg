id: glab-017-kw
schemaId: gitlab
query: stale merge requests review more than seven days
operation: |
  query {
    project(fullPath: "group/project") {
      mergeRequests(first: 10) {
        nodes {
          createdAt
          reviewers(first: 10) {
            nodes {
              __typename
            }
          }
        }
      }
    }
  }
targetFields:
  - MergeRequest.createdAt
targetTypes:
  - MergeRequest
  - MergeRequestReviewer
mustInclude:
  - Query.project
  - Project.mergeRequests
  - MergeRequest.createdAt
  - MergeRequest.reviewers
  - MergeRequest.reviewers(first:)
  - Project.mergeRequests(first:)
  - Query.project(fullPath:)
mustExclude:
  - Mutation
notes: "Keyword variant of glab-017. Maintainer: stale MRs in review. MR list + age + reviewer signal."
