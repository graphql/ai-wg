id: shop-006
schemaId: shopify
query: How much did we collect in refunds for orders with
  created_at:>2026-05-30, and which orders did they come from?
operation: |
  query {
    orders(first: 10, query: "created_at:>2026-05-30") {
      nodes {
        name
        refunds(first: 10) {
          totalRefundedSet {
            presentmentMoney {
              amount
            }
          }
          createdAt
        }
      }
    }
  }
targetFields:
  - Order.name
  - Refund.totalRefundedSet
  - Refund.createdAt
targetTypes:
  - Order
  - Refund
mustInclude:
  - QueryRoot.orders
  - Order.name
  - Order.refunds
  - Refund.totalRefundedSet
  - Refund.createdAt
  - Order.refunds(first:)
  - QueryRoot.orders(first:)
  - QueryRoot.orders(query:)
mustExclude:
  - Mutation
notes: Refunds aggregated last week, scoped per order.
answerSchema:
  type: object
  properties:
    orders:
      type: array
      items:
        type: object
        properties:
          name:
            type: string
          refundAmounts:
            type: array
            items:
              type: string
        required:
          - name
          - refundAmounts
        additionalProperties: false
  required:
    - orders
  additionalProperties: false
