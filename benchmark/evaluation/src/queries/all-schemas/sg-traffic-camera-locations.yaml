id: sg-traffic-camera-locations
schemaId: singapore
query: List all traffic camera locations with their image URLs and coordinates.
operation: |
  query {
    trafficCameras {
      cameraId
      imageUrl
      latitude
      longitude
      timestamp
    }
  }
targetFields:
  - TrafficCamera.imageUrl
  - TrafficCamera.latitude
  - TrafficCamera.longitude
targetTypes:
  - TrafficCamera
mustInclude:
  - Query.trafficCameras
  - TrafficCamera.imageUrl
  - TrafficCamera.latitude
  - TrafficCamera.longitude
mustExclude: []
shouldInclude:
  - TrafficCamera.cameraId
notes: Multi-leaf single-root. Tests that the algorithm includes all relevant
  leaves, not just the top one.
answerSchema:
  type: object
  properties:
    trafficCameras:
      type: array
      items:
        type: object
        properties:
          cameraId:
            type: string
          imageUrl:
            type: string
          latitude:
            type: number
          longitude:
            type: number
        required:
          - cameraId
          - imageUrl
          - latitude
          - longitude
        additionalProperties: false
  required:
    - trafficCameras
  additionalProperties: false
