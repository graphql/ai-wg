id: lin-ic-5
schemaId: linear
query: "What issues have I created recently?"
operation: |
  query {
    viewer {
      createdIssues(first: 10) {
        nodes {
          id
          title
          createdAt
        }
      }
    }
  }
targetFields:
  - Issue.title
  - Issue.createdAt
targetTypes:
  - Issue
mustInclude:
  - Query.viewer
  - User.createdIssues
  - Issue.id
  - Issue.title
  - Issue.createdAt
  - User.createdIssues(first:)
mustExclude:
  - Mutation
notes: Issues I personally filed.
answerSchema:
  type: object
  properties:
    createdIssues:
      type: array
      items:
        type: object
        properties:
          title:
            type: string
          createdAt:
            type: string
        required:
          - title
          - createdAt
        additionalProperties: false
  required:
    - createdIssues
  additionalProperties: false
