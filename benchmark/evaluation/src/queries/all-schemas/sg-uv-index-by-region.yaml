id: sg-uv-index-by-region
schemaId: singapore
query: How strong is the UV in the north region?
operation: |
  query {
    regionByName(name: NORTH) {
      name
      uvIndex {
        value
        descriptor
        timestamp
      }
    }
  }
targetFields:
  - UvIndex.value
  - UvIndex.descriptor
targetTypes:
  - Region
  - UvIndex
mustInclude:
  - Query.regionByName
  - Region.uvIndex
  - Query.regionByName(name:)
mustExclude: []
shouldInclude:
  - UvIndex
  - Region.name
notes: Top cosine match is likely Query.uvIndex (national). Correct answer is
  the per-region nested path.
answerSchema:
  type: object
  properties:
    uvIndex:
      type: object
      properties:
        value:
          type: integer
        descriptor:
          type: string
      required:
        - value
        - descriptor
      additionalProperties: false
  required:
    - uvIndex
  additionalProperties: false
answer:
  uvIndex:
    value: 165
    descriptor: Extreme
