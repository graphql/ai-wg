id: gh-ext-082-kw
schemaId: github
query: active project iterations items
operation: |
  query {
    organization(login: "octocat") {
      projectV2(number: 1) {
        field(name: "example") {
          __typename
        }
      }
    }
  }
targetFields: []
targetTypes:
  - Project
mustInclude:
