id: glab-052
schemaId: gitlab
query: Show pipeline coverage and creation date for the 'main' branch in
  group/project updated after 2025-05-07.
operation: |
  query {
    project(fullPath: "group/project") {
      pipelines(ref: "main", updatedAfter: "2025-05-07T00:00:00Z", first: 10) {
        nodes {
          coverage
          createdAt
        }
      }
    }
  }
targetFields:
  - Pipeline.coverage
  - Pipeline.createdAt
targetTypes:
  - Pipeline
mustInclude:
  - Query.project
  - Project.pipelines
  - Pipeline.coverage
  - Pipeline.createdAt
  - Project.pipelines(ref:)
  - Project.pipelines(updatedAfter:)
  - Project.pipelines(first:)
  - Query.project(fullPath:)
mustExclude:
  - Mutation
notes: "DevOps: coverage reports on main monthly."
answerSchema:
  type: object
  properties:
    pipelines:
      type: array
      items:
        type: object
        properties:
          coverage:
            type: number
          createdAt:
            type: string
        required:
          - coverage
          - createdAt
        additionalProperties: false
  required:
    - pipelines
  additionalProperties: false
answer:
  pipelines:
    - coverage: 56.29
      createdAt: 2025-05-29T00:00:00.000Z
    - coverage: 52.46
