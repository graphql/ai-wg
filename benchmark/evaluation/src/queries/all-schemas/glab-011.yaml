id: glab-011
schemaId: gitlab
query: List the issues across the projects I contribute to.
operation: |
  query {
    currentUser {
      contributedProjects(first: 10) {
        nodes {
          issues(first: 10) {
            nodes {
              iid
              title
              state
            }
          }
        }
      }
    }
  }
targetFields:
  - Issue.iid
  - Issue.title
  - Issue.state
targetTypes:
  - Issue
mustInclude:
  - Query.currentUser
  - CurrentUser.contributedProjects
  - Project.issues
  - CurrentUser.contributedProjects(first:)
  - Project.issues(first:)
mustExclude:
  - Mutation
notes: "Developer: issues across projects I contribute to."
answerSchema:
  type: object
  properties:
    issues:
      type: array
      items:
        type: object
        properties:
          iid:
            type: string
          title:
            type: string
          state:
            type: string
        required:
          - iid
          - title
          - state
        additionalProperties: false
  required:
    - issues
  additionalProperties: false
