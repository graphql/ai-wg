id: gh-ext-083-kw
schemaId: github
query: pull requests linked project board
operation: |
  query {
    organization(login: "octocat") {
      projectV2(number: 1) {
        items(first: 10) {
          nodes {
            content {
              ... on PullRequest {
                title
              }
            }
          }
        }
      }
    }
  }
targetFields:
  - PullRequest.title
targetTypes:
  - PullRequest
  - Project
mustInclude:
  - Query.organization
  - Organization.projectV2
  - ProjectV2.items
  - ProjectV2Item.content
  - PullRequest.title
  - Organization.projectV2(number:)
  - ProjectV2.items(first:)
  - Query.organization(login:)
mustExclude:
  - Mutation
notes: Keyword variant of gh-ext-083. Project items whose content is a PullRequest.
