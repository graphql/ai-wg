id: glab-088
schemaId: gitlab
query: Show release evidences for the latest release of the group/project project.
operation: |
  query {
    project(fullPath: "group/project") {
      releases(first: 1) {
        nodes {
          evidences(first: 10) {
            nodes {
              id
              sha
              filepath
              collectedAt
            }
          }
        }
      }
    }
  }
answerSchema:
  type: object
  properties:
    evidences:
      type: array
      items:
        type: object
        properties:
          id: &a1
            type: string
          sha: *a1
          filepath: *a1
          collectedAt: *a1
        required:
          - id
          - sha
          - filepath
          - collectedAt
        additionalProperties: false
  required:
    - evidences
  additionalProperties: false
targetFields:
  - ReleaseEvidence.id
  - ReleaseEvidence.sha
  - ReleaseEvidence.filepath
  - ReleaseEvidence.collectedAt
targetTypes:
  - ReleaseEvidence
mustInclude:
  - Query.project
  - Project.releases
  - Release.evidences
  - Project.releases(first:)
  - Query.project(fullPath:)
  - Release.evidences(first:)
  - ReleaseEvidence.id
  - ReleaseEvidence.sha
  - ReleaseEvidence.filepath
  - ReleaseEvidence.collectedAt
mustExclude:
  - Mutation
notes: "PM: release evidences."
