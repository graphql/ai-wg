id: gh-ext-039
schemaId: github
query: Which repositories in the octocat organization have vulnerability alerts
  enabled?
operation: |
  query {
    organization(login: "octocat") {
      repositories(first: 10) {
        nodes {
          name
          hasVulnerabilityAlertsEnabled
        }
      }
    }
  }
targetFields:
  - Repository.name
  - Repository.hasVulnerabilityAlertsEnabled
targetTypes:
  - Repository
mustInclude:
  - Query.organization
  - Organization.repositories
  - Repository.name
  - Repository.hasVulnerabilityAlertsEnabled
  - Organization.repositories(first:)
  - Query.organization(login:)
mustExclude:
  - Mutation
notes: Repositories with vulnerability reporting enabled (the only proxy for
  private vulnerability reporting).
answerSchema:
  type: object
  properties:
    repositories:
      type: array
      items:
        type: string
  required:
    - repositories
  additionalProperties: false
answer:
  repositories:
    - example
    - wiki-enabled