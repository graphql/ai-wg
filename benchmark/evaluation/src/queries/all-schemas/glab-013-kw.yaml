id: glab-013-kw
schemaId: gitlab
query: diff head sha merge request
operation: |
  query {
    mergeRequest(id: "gid://gitlab/MergeRequest/1") {
      diffStats {
        __typename
      }
      diffHeadSha
    }
  }
targetFields:
  - MergeRequest.diffHeadSha
targetTypes:
  - MergeRequest
mustInclude:
  - Query.mergeRequest
  - MergeRequest.diffStats
  - MergeRequest.diffHeadSha
  - Query.mergeRequest(id:)
mustExclude:
  - Mutation
notes: "Keyword variant of glab-013. Developer: diff for the head SHA of an MR."
