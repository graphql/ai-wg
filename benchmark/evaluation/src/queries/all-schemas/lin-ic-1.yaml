id: lin-ic-1
schemaId: linear
query: "What issues are currently assigned to me?"
operation: |
  query {
    viewer {
      assignedIssues(first: 10) {
        nodes {
          identifier
          title
          priority
          state {
            name
          }
        }
      }
    }
  }
targetFields:
  - Issue.identifier
  - Issue.title
  - Issue.priority
targetTypes:
  - Issue
mustInclude:
  - Query.viewer
  - User.assignedIssues
  - Issue.identifier
  - Issue.title
  - Issue.priority
  - Issue.state
  - WorkflowState.name
  - User.assignedIssues(first:)
mustExclude:
  - Mutation
notes: "Classic \"my open issues\" view."
answerSchema:
  type: object
  properties:
    assignedIssues:
      type: array
      items:
        type: object
        properties:
          identifier:
            type: string
          title:
            type: string
          priority:
            type: number
          state:
            type: object
            properties:
              name:
                type: string
            required:
              - name
            additionalProperties: false
        required:
          - identifier
          - priority
          - state
          - title
        additionalProperties: false
  required:
    - assignedIssues
  additionalProperties: false
