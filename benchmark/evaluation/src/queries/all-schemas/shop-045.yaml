id: shop-045
schemaId: shopify
query: Which customers have store credit balances we should remind them about?
operation: |
  query {
    customers(first: 10) {
      nodes {
        displayName
        storeCreditAccounts(first: 10) {
          nodes {
            balance {
              amount
              currencyCode
            }
          }
        }
      }
    }
  }
targetFields: []
targetTypes: []
mustInclude:
  - QueryRoot.customers
  - Customer.displayName
  - Customer.storeCreditAccounts
  - StoreCreditAccount.balance
  - MoneyV2.amount
  - MoneyV2.currencyCode
  - Customer.storeCreditAccounts(first:)
  - QueryRoot.customers(first:)
mustExclude:
  - Mutation
notes: Customers with store credit balances to remind them about.
answerSchema:
  type: object
  properties:
    customers:
      type: array
      items:
        type: object
        properties:
          displayName:
            type: string
          balances:
            type: array
            items:
              type: object
              properties:
                amount:
                  type: string
                currencyCode:
                  type: string
              required:
                - amount
                - currencyCode
              additionalProperties: false
        required:
          - displayName
          - balances
        additionalProperties: false
  required:
    - customers
  additionalProperties: false
answer:
