id: shop-040
schemaId: shopify
query: For each location, what inventory quantities (the state name and amount
  of each) are recorded at each of its inventory levels?
operation: |
  query {
    locations(first: 10) {
      nodes {
        name
        inventoryLevels(first: 10) {
          nodes {
            quantities(names: ["available", "incoming", "committed", "on_hand", "reserved"]) {
              name
              quantity
            }
          }
        }
      }
    }
  }
targetFields:
  - Location.name
  - InventoryQuantity.name
  - InventoryQuantity.quantity
targetTypes:
  - Location
  - InventoryLevel
  - InventoryQuantity
mustInclude:
  - QueryRoot.locations
  - QueryRoot.locations(first:)
  - Location.name
  - Location.inventoryLevels
  - Location.inventoryLevels(first:)
  - InventoryLevel.quantities
  - InventoryLevel.quantities(names:)
  - InventoryQuantity.name
  - InventoryQuantity.quantity
mustExclude:
  - Mutation
notes: Inventory quantities (each state name and its amount) per inventory level
  per location.
answerSchema:
  type: object
  properties:
    locations:
      type: array
      items:
        type: object
        properties:
          name:
            type: string
          quantities:
            type: array
            items:
              type: object
              properties:
                name:
                  type: string
                quantity:
                  type: integer
              required:
                - name
                - quantity
              additionalProperties: false
        required:
          - name
          - quantities
        additionalProperties: false
  required:
    - locations
  additionalProperties: false
answer:
