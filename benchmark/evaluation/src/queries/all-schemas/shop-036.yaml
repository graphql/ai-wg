id: shop-036
schemaId: shopify
query: Show all product variants where the barcode is missing.
operation: |
  query {
    productVariants(first: 10, query: "-barcode:*") {
      nodes {
        barcode
        sku
      }
    }
  }
targetFields:
  - ProductVariant.barcode
  - ProductVariant.sku
targetTypes:
  - ProductVariant
mustInclude:
  - QueryRoot.productVariants
  - ProductVariant.barcode
  - ProductVariant.sku
  - QueryRoot.productVariants(first:)
  - QueryRoot.productVariants(query:)
mustExclude:
  - Mutation
notes: Variants missing a barcode value.
answerSchema:
  type: object
  properties:
    variants:
      type: array
      items:
        type: object
        properties:
          sku:
            type: string
        required:
          - sku
        additionalProperties: false
  required:
    - variants
  additionalProperties: false
answer:
  variants: []