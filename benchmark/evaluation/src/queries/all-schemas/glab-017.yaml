id: glab-017
schemaId: gitlab
query: List open merge requests in project group/project showing iid, title,
  createdAt, and reviewers.
operation: |
  query {
    project(fullPath: "group/project") {
      mergeRequests(first: 10, state: opened) {
        nodes {
          iid
          title
          createdAt
          reviewers {
            nodes {
              username
            }
          }
        }
      }
    }
  }
targetFields:
  - MergeRequest.iid
  - MergeRequest.title
  - MergeRequest.createdAt
  - MergeRequestReviewer.username
targetTypes:
  - MergeRequest
  - MergeRequestReviewer
mustInclude:
  - Query.project
  - Project.mergeRequests
  - MergeRequest.iid
  - MergeRequest.title
  - MergeRequest.createdAt
  - MergeRequest.reviewers
  - MergeRequestReviewer.username
  - Project.mergeRequests(first:)
  - Project.mergeRequests(state:)
  - Query.project(fullPath:)
mustExclude:
  - Mutation
notes: "Maintainer: stale MRs in review. MR list + age + reviewer signal."
answerSchema:
  type: object
  properties:
    mergeRequests:
      type: array
      items:
        type: object
        properties:
          iid:
            type: string
          title:
            type: string
          createdAt:
            type: string
          reviewers:
            type: array
            items:
              type: string
        required:
          - iid
          - title
          - createdAt
          - reviewers
        additionalProperties: false
  required:
    - mergeRequests
  additionalProperties: false
